<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background · cream stit-claude light tone -->
  <rect width="1200" height="630" fill="#f9f7f3" />

  <!-- Minute-axis hairlines (decorative, ultra-faint) -->
  <g stroke="#1a1a1a" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="3 5">
    <line x1="80" y1="160" x2="1120" y2="160" />
    <line x1="80" y1="315" x2="1120" y2="315" />
    <line x1="80" y1="470" x2="1120" y2="470" />
  </g>

  <!-- Kicker · mono uppercase -->
  <text x="80" y="80"
        font-family="ui-monospace, 'JetBrains Mono', 'Courier New', monospace"
        font-size="20"
        font-weight="600"
        fill="#ee624e"
        letter-spacing="3">
    @MYRKH/MEMORY-GRAPH   ·   V0.1.0   ·   MIT
  </text>

  <!-- Headline · display italic (generic serif fallback) -->
  <text x="80" y="200"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="100"
        font-weight="700"
        fill="#1f1f1f">
    See how people
  </text>
  <text x="80" y="310"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="100"
        font-weight="700"
        fill="#1f1f1f">
    <tspan fill="#ee624e">actually</tspan> read.
  </text>

  <!-- Deck · serif -->
  <text x="80" y="380"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="26"
        fill="#555">
    A React library that turns reading into a graph.
  </text>
  <text x="80" y="415"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="26"
        fill="#555">
    Multi-DOM · multi-strategy · smart defaults · zero network.
  </text>

  <!-- Right-side mini graph composition (3 stations + forward edges + return arc) -->
  <g transform="translate(820, 140)">
    <!-- Forward edges -->
    <line x1="50" y1="30" x2="160" y2="160" stroke="#1a1a1a" stroke-opacity="0.35" stroke-width="1.6" />
    <line x1="160" y1="160" x2="100" y2="290" stroke="#1a1a1a" stroke-opacity="0.35" stroke-width="1.6" />
    <!-- Return arc (signature coral dashed right-curve) -->
    <path d="M 100 290 Q 290 160 50 30" fill="none" stroke="#ee624e" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.9" />
    <!-- Station 1 · circle (paragraph) -->
    <circle cx="50" cy="30" r="14" fill="#ee624e" stroke="#f9f7f3" stroke-width="3" />
    <!-- Station 2 · diamond (figure) -->
    <rect x="146" y="146" width="28" height="28" fill="#ee624e" stroke="#f9f7f3" stroke-width="3" transform="rotate(45 160 160)" />
    <!-- Station 3 · square (kpi) -->
    <rect x="86" y="276" width="28" height="28" fill="#ee624e" stroke="#f9f7f3" stroke-width="3" />
  </g>

  <!-- Bottom strip · minimal meta -->
  <line x1="80" y1="530" x2="1120" y2="530" stroke="#1a1a1a" stroke-opacity="0.12" stroke-width="1" />

  <text x="80" y="575"
        font-family="ui-monospace, 'JetBrains Mono', 'Courier New', monospace"
        font-size="18"
        font-weight="500"
        fill="#555"
        letter-spacing="2">
    REACT · TYPESCRIPT · OKLCH · 5 NODE KINDS · 4 CAPTURE STRATEGIES
  </text>

  <text x="1120" y="575"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="20"
        fill="#ee624e"
        text-anchor="end">
    npm i @myrkh/memory-graph
  </text>
</svg>
